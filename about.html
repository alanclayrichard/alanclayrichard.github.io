<!DOCTYPE html>
<html>
    <head>
        <title>Pantazes Research Lab</title>
        <style>
            /* Style the header with a grey background and some padding */
            .header {
            overflow: hidden;
            background-color: #03244d;
            padding: 20px 10px;
            }

            /* Style the header links */
            .header a {
            float: left;
            color: #dd550c;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-size: 18px; 
            line-height: 25px;
            border-radius: 4px;
            }

            /* Style the logo link (notice that we set the same value of line-height and font-size to prevent the header to increase when the font gets bigger */
            .header a.logo {
            font-size: 25px;
            font-weight: bold;
            }

            /* Change the background color on mouse-over */
            .header a:hover {
            background-color: #f68026;
            color: #496e9c;
            }

            /* Style the active/current link*/
            .header a.active {
            background-color: #496e9c;
            color: #f68026;
            }

            /* Float the link section to the right */
            .header-right {
            float: right;
            }

            /* Add media queries for responsiveness - when the screen is 500px wide or less, stack the links on top of each other */ 
            @media screen and (max-width: 500px) {
            .header a {
                float: none;
                display: block;
                text-align: left;
            }
            .header-right {
                float: none;
            }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <a href="/alanclayrichard.github.io/index.html" class="logo">Pantazes Research Lab</a>
            <div class="header-right">
              <a class="active" href="/alanclayrichard.github.io/index.html">Home</a>
              <a href="#contact">Contact</a>
              <a href="/alanclayrichard.github.io/about.html">About</a>
              <a href="#ourteam">Our Team</a>
              <a href="#publications">Publications</a>
            </div>
        </div>
        
        <h1>About the Pantazes Lab</h1>

    </body>
</html>
